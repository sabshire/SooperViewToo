name: sooperview
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  ffmpeg_kit_extended_flutter:
    git:
      url: https://github.com/akashskypatel/ffmpeg-kit-extended
      path: flutter
      ref: dev
  path_provider: ^2.1.5
  path: ^1.8.3
  file_picker: 10.3.8
  open_file_manager: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

ffmpeg_kit_extended_config:
  type: "full" # pre-bundled builds: debug, base, full, audio, video, video_hw
  gpl: true # enable to include GPL libraries
  small: true # enable to use smaller builds
